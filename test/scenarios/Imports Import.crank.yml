steps:
- step: start hubspot lead import
  data:
    columnMap: '{{test.columnMap}}'
    contacts: '{{test.contacts}}'
    idColumn: '{{test.idColumn}}'
    csvArray: '{{test.csvArray}}'
- step: the state field on hubspot imports with id {{hubspot.imports.id}} should be DONE
  failAfter: 60
  data:
    id: '{{hubspot.imports.id}}'
- step: And number of errors for hubspot imports with id {{hubspot.imports.id}} should be 0
  data:
    id: '{{hubspot.imports.id}}'
    contacts: '{{test.contacts}}'
- step: And add a list of hubspot contacts to contact list by email
  data:
    multiple_email: '{{test.email}}'
    listId: '2'
- step: And the lastname field on hubspot list import contacts should be {{test.passedContacts}}
  data:
    multiple_email: '{{test.email}}'

  